<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>lab-readiness-ls-output</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; }

  body {
    background: #000000;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .terminal {
    background: #000000;
    width: 860px;
    padding: 22px 28px 22px 28px;
    font-size: 13.5px;
    line-height: 1.7;
    color: #ffffff;
  }

  .row      { display: flex; white-space: pre; }
  .perms    { color: #ffffff; width: 11ch; flex-shrink: 0; }
  .links    { color: #ffffff; width: 2ch; flex-shrink: 0; text-align: right; margin-right: 1ch; }
  .owner    { color: #ffffff; width: 6ch; flex-shrink: 0; }
  .group    { color: #ffffff; width: 6ch; flex-shrink: 0; }
  .size     { color: #ffffff; width: 6ch; flex-shrink: 0; text-align: right; margin-right: 1ch; }
  .date     { color: #ffffff; width: 13ch; flex-shrink: 0; }
  .name-file { color: #ffffff; }
</style>
</head>
<body>
<div class="terminal">

  <div class="row">
    <span class="perms">-rw-rw-r-- </span>
    <span class="links">1 </span>
    <span class="owner">cisco </span>
    <span class="group">cisco </span>
    <span class="size">219 </span>
    <span class="date">May 12 19:51 </span>
    <span class="name-file">/home/cisco/ansible.cfg</span>
  </div>

  <div class="row">
    <span class="perms">-rw-rw-r-- </span>
    <span class="links">1 </span>
    <span class="owner">cisco </span>
    <span class="group">cisco </span>
    <span class="size">3539 </span>
    <span class="date">May 12 19:51 </span>
    <span class="name-file">/home/cisco/inventory.yml</span>
  </div>

</div>
</body>
</html>
