---
# =============================================================================
# Playbook: Validate IS-IS Configuration and Client Reachability
# Purpose: Verify IS-IS adjacencies, routing tables, and loopback reachability
#
# Note: CSR validation uses shell+SSH (same as deployment) because CSR IOS-XE
#       16.12 requires legacy SSH KEX algorithms not supported by paramiko.
# =============================================================================

# ---------- PLAY 1: Validate IS-IS on CSRs (via shell+SSH) ----------
- name: "Task 2 Validate: CSR IS-IS Configuration"
  hosts: csr
  gather_facts: false
  connection: local

  vars:
    ssh_args: >-
      -o StrictHostKeyChecking=no
      -o HostKeyAlgorithms=ssh-rsa
      -o PubkeyAcceptedKeyTypes=ssh-rsa
      -o KexAlgorithms=diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1
      -o ConnectTimeout=10

  tasks:
    - name: "{{ inventory_hostname }} | Check IS-IS neighbors and routes"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} "show isis neighbors ; show ip route isis"
      register: csr_isis
      changed_when: false
      timeout: 30
      tags: [validate_adjacencies]

    - name: "{{ inventory_hostname }} | IS-IS Status"
      debug:
        msg: "{{ csr_isis.stdout }}"
      tags: [validate_adjacencies]


# ---------- PLAY 2: Validate IS-IS on N9Ks ----------
- name: "Task 2 Validate: N9K IS-IS Configuration"
  hosts: nxos
  gather_facts: false

  tasks:
    - name: "{{ inventory_hostname }} | Check IS-IS adjacency"
      cisco.nxos.nxos_command:
        commands:
          - "show isis adjacency"
          - "show isis database"
      register: n9k_isis
      tags: [validate_adjacencies]

    - name: "{{ inventory_hostname }} | IS-IS Status"
      debug:
        msg: "{{ n9k_isis.stdout_lines }}"
      tags: [validate_adjacencies]

    - name: "{{ inventory_hostname }} | Check IS-IS routing table"
      cisco.nxos.nxos_command:
        commands:
          - "show ip route isis"
      register: n9k_routes
      tags: [validate_routes]

    - name: "{{ inventory_hostname }} | IS-IS Routes"
      debug:
        msg: "{{ n9k_routes.stdout }}"
      tags: [validate_routes]


# ---------- PLAY 3: Validation Summary ----------
- name: "Task 2 Validate: Summary"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Validation Summary
      debug:
        msg: |
          ==========================================
          Task 2: IS-IS Validation Summary
          ==========================================
          Review the output above and verify:

          [1] CSR-PE01: ISIS CORE neighbor (xrd01) + CUSTOMER_RED neighbor (n9k-ce01)
          [2] CSR-PE02: ISIS CORE neighbor (xrd02) + CUSTOMER_PURPLE neighbor (n9k-ce02)
          [3] N9K-CE01: ISIS CUSTOMER_RED adjacency to CSR-PE01
          [4] N9K-CE02: ISIS CUSTOMER_PURPLE adjacency to CSR-PE02
          [5] ISIS routes present on all devices
          ==========================================
      tags: [always]
