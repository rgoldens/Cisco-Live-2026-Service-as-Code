---
# Playbook: Deploy IS-IS to CSR PEs (ABR Configuration)
# Purpose: Configure CSR-PE01 and CSR-PE02 as ABRs connecting CORE and CUSTOMER areas
# Connection: Local with sshpass for legacy SSH algorithm support

- name: Deploy IS-ISIS Configuration to CSR PEs
  hosts: csr
  gather_facts: false
  vars:
    ansible_command_timeout: 30
    
  tasks:
    - name: "CSR-{{ inventory_hostname }} | Deploy IS-IS configuration via SSH"
      shell: |
        sshpass -p {{ ansible_password }} ssh {{ ssh_options }} {{ ansible_user }}@{{ ansible_host }} << 'EOCONFIG'
        configure terminal
        
        ! ===== CLEAR OLD CONFIG =====
        no router isis CORE
        no router isis {% if pe_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
        ! ===== ENABLE CORE IS-ISIS INSTANCE (Level-2, BACKBONE) =====
        router isis CORE
         net 49.0000.0000.0000.{% if inventory_hostname == 'csr-pe01' %}0011{% else %}0012{% endif %}.00
         is-type level-2-only
         metric-style wide
         passive-interface Loopback0
        exit
        
        ! ===== ENABLE CUSTOMER IS-ISIS INSTANCE (Level-1, LOCAL) =====
        router isis {% if pe_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
         net 49.000{% if pe_site == 'red' %}1{% else %}2{% endif %}.0000.0000.000{% if inventory_hostname == 'csr-pe01' %}1{% else %}2{% endif %}.00
         is-type level-1-only
         metric-style wide
         passive-interface Loopback0
        exit
        
        ! ===== ENABLE IS-ISIS ON INTERFACES =====
        interface GigabitEthernet2
         ip router isis CORE
         isis circuit-type level-2-only
        exit
        
        interface GigabitEthernet4
         ip router isis {% if pe_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
         isis circuit-type level-1
        exit
        
        ! ===== ENABLE IS-ISIS ON LOOPBACK =====
        interface Loopback0
         ip router isis CORE
         ip router isis {% if pe_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
        exit
        
        exit
        write memory
        EOCONFIG
      register: ssh_result
      tags:
        - deploy_isis

    - name: "CSR-{{ inventory_hostname }} | Display deployment output"
      debug:
        msg: "{{ ssh_result.stdout }}"
      tags:
        - debug

    - name: "CSR-{{ inventory_hostname }} | Verify IS-ISIS configuration deployed"
      shell: |
        sshpass -p {{ ansible_password }} ssh {{ ssh_options }} {{ ansible_user }}@{{ ansible_host }} "show run | include 'router isis'"
      register: verify_result
      tags:
        - verify

    - name: "CSR-{{ inventory_hostname }} | Display IS-IS configuration"
      debug:
        msg: "{{ verify_result.stdout_lines }}"
      tags:
        - verify
