---
# Playbook: Deploy ISIS Configuration to CSR PEs
# Purpose: Configure CSR-PE01 and CSR-PE02 as Area Border Routers
# Note: Uses direct SSH instead of network_cli to work around SSH library KEX limitation
# Devices: csr-pe01 (RED), csr-pe02 (PURPLE)

- name: Deploy ISIS to CSR PEs
  hosts: csr
  gather_facts: false
  connection: local
  
  vars:
    ssh_args: "-o StrictHostKeyChecking=no -o HostKeyAlgorithms=ssh-rsa -o PubkeyAcceptedKeyTypes=ssh-rsa -o KexAlgorithms=diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 -o ConnectTimeout=10"
    
    device_config:
      csr-pe01:
        pe_id: "0011"
        customer: "RED"
        customer_isis: "CUSTOMER_RED"
        customer_net_id: "0001"
      csr-pe02:
        pe_id: "0012"
        customer: "PURPLE"
        customer_isis: "CUSTOMER_PURPLE"
        customer_net_id: "0002"
    
    this_device: "{{ device_config[inventory_hostname] }}"
  
  tasks:
    # Step 1: Deploy ISIS CORE configuration on CSR
    - name: "{{ inventory_hostname }} | Configure ISIS CORE instance (level-2, backbone)"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} <<'EOF'
        configure terminal
        no router isis CORE
        router isis CORE
         net 49.0000.0000.0000.{{ this_device.pe_id }}.00
         is-type level-2-only
         metric-style wide
         passive-interface Loopback0
        exit
        end
        write memory
        EOF
      register: config_result
      changed_when: "'ISIS' in config_result.stdout"
      tags:
        - deploy_isis

    # Step 2: Deploy ISIS CUSTOMER configuration on CSR
    - name: "{{ inventory_hostname }} | Configure ISIS CUSTOMER instance (level-1, local)"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} <<'EOF'
        configure terminal
        no router isis {{ this_device.customer_isis }}
        router isis {{ this_device.customer_isis }}
         net 49.000{{ this_device.customer_net_id }}.0000.0000.{{ this_device.pe_id }}.00
         is-type level-1-only
         metric-style wide
         passive-interface Loopback0
        exit
        end
        write memory
        EOF
      register: config_result
      changed_when: "'ISIS' in config_result.stdout"
      tags:
        - deploy_isis

    # Step 3: Enable ISIS on Gi2 (backbone interface)
    - name: "{{ inventory_hostname }} | Enable ISIS CORE on GigabitEthernet2"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} <<'EOF'
        configure terminal
        interface GigabitEthernet2
         ip router isis CORE
         isis circuit-type level-2-only
        exit
        end
        write memory
        EOF
      changed_when: false
      tags:
        - deploy_isis

    # Step 4: Enable ISIS on Gi4 (customer interface)  
    - name: "{{ inventory_hostname }} | Enable ISIS CUSTOMER on GigabitEthernet4"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} <<'EOF'
        configure terminal
        interface GigabitEthernet4
         ip router isis {{ this_device.customer_isis }}
         isis circuit-type level-1
        exit
        end
        write memory
        EOF
      changed_when: false
      tags:
        - deploy_isis

    # Step 5: Enable ISIS on Loopback0 (router identity)
    - name: "{{ inventory_hostname }} | Enable ISIS on Loopback0"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} <<'EOF'
        configure terminal
        interface Loopback0
         ip router isis CORE
         ip router isis {{ this_device.customer_isis }}
        exit
        end
        write memory
        EOF
      changed_when: false
      tags:
        - deploy_isis

    # Step 6: Verify ISIS configuration
    - name: "{{ inventory_hostname }} | Verify ISIS configuration"
      shell: |
        ssh {{ ssh_args }} admin@{{ ansible_host }} "show run | include isis"
      register: verify_result
      changed_when: false

    - name: "{{ inventory_hostname }} | Display ISIS verification"
      debug:
        msg: |
          ✅ ISIS Configuration Deployed to {{ inventory_hostname }}
          
          Running Config (ISIS):
          {{ verify_result.stdout }}
      tags:
        - deploy_isis
