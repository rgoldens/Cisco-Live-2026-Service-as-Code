---
# Playbook: Deploy IS-IS to N9K CEs
# Purpose: Configure N9K-CE01 and N9K-CE02 with IS-IS to peer with CSR ABRs
# Connection: Local with sshpass for legacy SSH algorithm support

- name: Deploy IS-ISIS Configuration to N9K CEs
  hosts: nxos
  gather_facts: false
  vars:
    ansible_command_timeout: 30
    
  tasks:
    - name: "N9K-{{ inventory_hostname }} | Deploy IS-IS configuration via SSH"
      shell: |
        sshpass -p {{ ansible_password }} ssh {{ ssh_options }} {{ ansible_user }}@{{ ansible_host }} << 'EOCONFIG'
        configure terminal
        
        ! ===== ENABLE ISIS FEATURE =====
        feature isis
        
        ! ===== ENABLE {% if ce_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %} IS-ISIS INSTANCE (Level-1) =====
        router isis {% if ce_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
         net 49.000{% if ce_site == 'red' %}1{% else %}2{% endif %}.0000.0000.0{% if inventory_hostname == 'n9k-ce01' %}101{% else %}102{% endif %}.00
         is-type level-1-only
         metric-style wide
        exit
        
        ! ===== ENABLE IS-ISIS ON Eth1/1 (to CSR PE) =====
        interface Ethernet1/1
         description TO_CSR_PE
         ip router isis {% if ce_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
         isis circuit-type level-1
        exit
        
        ! ===== ENABLE IS-ISIS ON Loopback0 (PASSIVE) =====
        interface loopback0
         ip router isis {% if ce_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
         isis passive
        exit
        
        ! ===== REDISTRIBUTE CONNECTED ROUTES (CLIENT SUBNETS) =====
        route-map ALLOW_ALL permit 10
        exit
        
        router isis {% if ce_site == 'red' %}CUSTOMER_RED{% else %}CUSTOMER_PURPLE{% endif %}
        
         redistribute connected route-map ALLOW_ALL
        exit
        
        exit
        copy running-config startup-config
        EOCONFIG
      register: ssh_result
      tags:
        - deploy_isis

    - name: "N9K-{{ inventory_hostname }} | Display deployment output"
      debug:
        msg: "{{ ssh_result.stdout }}"
      tags:
        - debug

    - name: "N9K-{{ inventory_hostname }} | Verify IS-ISIS configuration deployed"
      shell: |
        sshpass -p {{ ansible_password }} ssh {{ ssh_options }} {{ ansible_user }}@{{ ansible_host }} "show run | include 'router isis'"
      register: verify_result
      tags:
        - verify

    - name: "N9K-{{ inventory_hostname }} | Display IS-IS configuration"
      debug:
        msg: "{{ verify_result.stdout_lines }}"
      tags:
        - verify
