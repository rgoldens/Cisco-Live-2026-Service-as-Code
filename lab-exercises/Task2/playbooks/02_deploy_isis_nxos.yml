---
# Playbook: Deploy ISIS Configuration to N9K CEs
# Purpose: Configure N9K-CE01 and N9K-CE02 with ISIS (level-1-only) to peer with CSR PEs
# Uses: nxos_config module for Cisco NXOS devices
# Devices: n9k-ce01 (RED), n9k-ce02 (PURPLE)

- name: Deploy ISIS to N9K CEs
  hosts: nxos
  gather_facts: false
  
  vars:
    # Device-to-configuration mapping
    device_config:
      n9k-ce01:
        ce_id: "0021"
        customer: "RED"
        customer_isis: "CUSTOMER_RED"
        customer_net_id: "0001"
      n9k-ce02:
        ce_id: "0022"
        customer: "PURPLE"
        customer_isis: "CUSTOMER_PURPLE"
        customer_net_id: "0002"
    
    # Shorthand for this device's config
    this_device: "{{ device_config[inventory_hostname] }}"
  
  tasks:
    # Step 1: Enable ISIS feature
    - name: "{{ inventory_hostname }} | Enable ISIS feature"
      cisco.nxos.nxos_config:
        lines:
          - "feature isis"
      tags:
        - deploy_isis

    # Step 2: Configure ISIS instance
    - name: "{{ inventory_hostname }} | Configure ISIS CUSTOMER instance (level-1-only)"
      cisco.nxos.nxos_config:
        lines:
          - "net 49.{{ this_device.customer_net_id }}.0000.0000.{{ this_device.ce_id }}.00"
          - "is-type level-1"
        parents: "router isis {{ this_device.customer_isis }}"
        match: line
      tags:
        - deploy_isis

    # Step 3: Enable ISIS on Eth1/1 (to CSR PE)
    - name: "{{ inventory_hostname }} | Enable ISIS on Eth1/1 (to CSR PE)"
      cisco.nxos.nxos_config:
        lines:
          - "description TO_CSR_PE"
          - "ip router isis {{ this_device.customer_isis }}"
          - "isis circuit-type level-1"
        parents: "interface Ethernet1/1"
        match: line
      tags:
        - deploy_isis

    # Step 4: Enable ISIS on Loopback0 (passive)
    - name: "{{ inventory_hostname }} | Enable ISIS on Loopback0 (passive - device identity)"
      cisco.nxos.nxos_config:
        lines:
          - "ip router isis {{ this_device.customer_isis }}"
        parents: "interface Loopback0"
        match: line
      tags:
        - deploy_isis

    # Step 5: Save Configuration
    - name: "{{ inventory_hostname }} | Save running config to startup"
      cisco.nxos.nxos_command:
        commands:
          - "copy running-config startup-config"
      tags:
        - deploy_isis
