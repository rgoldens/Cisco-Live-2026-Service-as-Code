---
# =============================================================================
# Master Playbook: Task 2 - IS-IS ABR Design
# Purpose: Orchestrate full deployment of IS-IS CORE + CUSTOMER configuration
#
# Run order:
#   1. Deploy ISIS to CSR PEs (CORE + CUSTOMER instances)
#   2. Deploy ISIS CUSTOMER to N9K CEs
#   3. Wait for convergence
#   4. Validate ISIS adjacencies
# =============================================================================

# ---------- Banner ----------
- name: "Task 2 Banner"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display Task 2 Header
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════╗
          ║     TASK 2: IS-IS with Area Border Router Design          ║
          ║                                                           ║
          ║  Goal: Enable client reachability to CSR loopbacks       ║
          ║  via IS-IS routing with ABR architecture                 ║
          ║                                                           ║
          ║  RED clients  → CSR-PE01 loopback (192.168.10.11)        ║
          ║  PURPLE clients → CSR-PE02 loopback (192.168.10.12)      ║
          ╚═══════════════════════════════════════════════════════════╝

# ---------- Step 1: CSR ISIS ----------
- import_playbook: 01_deploy_isis_csr.yml

# ---------- Step 2: N9K ISIS ----------
- import_playbook: 02_deploy_isis_nxos.yml

# ---------- Step 3: Convergence + Completion ----------
- name: "Task 2: Convergence Wait + Summary"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Convergence wait
      pause:
        seconds: 30
        prompt: "Waiting 30s for IS-IS convergence and adjacency establishment..."

    - name: Task 2 Completion
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════╗
          ║           TASK 2 DEPLOYMENT COMPLETE                      ║
          ║                                                           ║
          ║  Next Steps:                                             ║
          ║  1. Verify IS-IS adjacencies (show isis neighbors)      ║
          ║  2. Test client ping to PE loopbacks                    ║
          ║  3. Proceed to Task 3: MPLS L3VPN                       ║
          ╚═══════════════════════════════════════════════════════════╝
