# CSR-PE02 Specific Configuration
---

# CSR-PE02 hosts PURPLE customers
# Will run IS-IS in two areas:
# 1. CORE area (connects to XRd backbone)
# 2. CUSTOMER_PURPLE area (connects to N9K-CE02)

device_role: "pe_purple"

isis_instances:
  core:
    name: "CORE"
    net: "49.0000.00000000.0012.00"  # CSR-PE02 in CORE
    level_type: "level-2-only"
    interfaces:
      - name: "GigabitEthernet2"
        isis_area: "CORE"
        isis_level: "level-2"
      - name: "Loopback0"
        isis_area: "CORE"
        passive: true
        
  customer:
    name: "CUSTOMER_PURPLE"
    net: "49.0000.PURPLE.csrpe02.00"  # CSR-PE02 in CUSTOMER_PURPLE
    level_type: "level-1-only"
    interfaces:
      - name: "GigabitEthernet4"
        isis_area: "CUSTOMER_PURPLE"
        isis_level: "level-1"
      - name: "Loopback0"
        isis_area: "CUSTOMER_PURPLE"
        passive: true

# Loopback details
loopback:
  interface: "Loopback0"
  ip: "192.168.10.12"
  mask: "255.255.255.255"
  isis: true
