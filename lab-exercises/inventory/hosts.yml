# Ansible Inventory for LTRATO-1001 Lab
# Used across Task 1, Task 2, and Task 3

all:
  children:
    network_devices:
      children:
        xrd:
          hosts:
            xrd01:
              ansible_host: 172.20.20.10
            xrd02:
              ansible_host: 172.20.20.11
          vars:
            ansible_user: clab
            ansible_network_os: ios.iosxr
            ansible_connection: network_cli

        csr:
          hosts:
            csr-pe01:
              ansible_host: 172.20.20.20
            csr-pe02:
              ansible_host: 172.20.20.21
          vars:
            ansible_user: admin
            ansible_password: admin
            ansible_network_os: ios
            ansible_connection: network_cli
            ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o HostKeyAlgorithms=ssh-rsa -o PubkeyAcceptedKeyTypes=ssh-rsa -o KexAlgorithms=diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1"

        nxos:
          hosts:
            n9k-ce01:
              ansible_host: 172.20.20.30
            n9k-ce02:
              ansible_host: 172.20.20.31
          vars:
            ansible_user: admin
            ansible_password: admin
            ansible_network_os: nxos
            ansible_connection: network_cli
            ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o HostKeyAlgorithms=ssh-rsa -o PubkeyAcceptedKeyTypes=ssh-rsa -o KexAlgorithms=diffie-hellman-group14-sha1"

    clients:
      hosts:
        linux-client1:
          ansible_host: 172.20.20.40
        linux-client2:
          ansible_host: 172.20.20.41
        linux-client3:
          ansible_host: 172.20.20.42
        linux-client4:
          ansible_host: 172.20.20.43
      vars:
        ansible_user: root
        ansible_connection: ssh
