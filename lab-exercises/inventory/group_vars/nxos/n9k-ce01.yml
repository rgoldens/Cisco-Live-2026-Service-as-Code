# N9K-CE01 ISIS Configuration (Student Template)
---

# Device Role: CE01 for RED customer (level-1-only)
device_name: "n9k-ce01"
device_role: "CE"
customer: "RED"

# Loopback IP for this device  
loopback_ip: "192.168.20.21"
loopback_mask: "255.255.255.255"

# ISIS Configuration for N9K-CE01
# This device runs ISIS in CUSTOMER_RED area (level-1-only)
# Connected to PE01 (CSR) via Gi4

isis_instance:
  name: "CUSTOMER_RED"
  net_address: "49.0001.0000.0000.0021.00"
  level_type: "level-1-only"
  metric_style: "wide"
  is_type: "level-1"

# ISIS-enabled interfaces
interfaces:
  # Connection to CSR-PE01 (GigabitEthernet4)
  gi4:
    description: "TO_CSR_PE01"
    isis_enabled: true
    isis_circuit_type: "level-1"
    
  # Loopback (passive, just advertises the address)
  loopback0:
    description: "CE_ROUTER_ID"
    isis_enabled: true
    isis_passive: true
    isis_circuit_type: "level-1"

# Advertise connected client networks via ISIS
redistribute:
  protocol: "connected"
  method: "isis CUSTOMER_RED"
