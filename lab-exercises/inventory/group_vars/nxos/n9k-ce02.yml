# N9K-CE02 ISIS Configuration (Student Template)
---

# Device Role: CE02 for PURPLE customer (level-1-only)
device_name: "n9k-ce02"
device_role: "CE"
customer: "PURPLE"

# Loopback IP for this device
loopback_ip: "192.168.20.22"
loopback_mask: "255.255.255.255"

# ISIS Configuration for N9K-CE02
# This device runs ISIS in CUSTOMER_PURPLE area (level-1-only)
# Connected to PE02 (CSR) via Gi4

isis_instance:
  name: "CUSTOMER_PURPLE"
  net_address: "49.0002.0000.0000.0022.00"
  level_type: "level-1-only"
  metric_style: "wide"
  is_type: "level-1"

# ISIS-enabled interfaces
interfaces:
  # Connection to CSR-PE02 (GigabitEthernet4)
  gi4:
    description: "TO_CSR_PE02"
    isis_enabled: true
    isis_circuit_type: "level-1"
    
  # Loopback (passive, just advertises the address)
  loopback0:
    description: "CE_ROUTER_ID"
    isis_enabled: true
    isis_passive: true
    isis_circuit_type: "level-1"

# Advertise connected client networks via ISIS
redistribute:
  protocol: "connected"
  method: "isis CUSTOMER_PURPLE"
