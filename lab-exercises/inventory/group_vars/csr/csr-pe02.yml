# CSR-PE02 ISIS Configuration (Student Template)
---

# Device Role: PE02 for PURPLE customer
device_name: "csr-pe02"
device_role: "PE"
customer: "PURPLE"

# Loopback IP for this device
loopback_ip: "192.168.10.12"
loopback_mask: "255.255.255.255"

# ISIS Configuration for CSR-PE02
# This device participates in TWO ISIS areas:
# 1. CORE (backbone) - level-2-only
# 2. CUSTOMER_PURPLE (customer area) - level-1-only

isis_instances:
  # Area 1: CORE (connects to backbone XRd01/XRd02 via Gi2)
  core:
    name: "CORE"
    net_address: "49.0000.00000000.0012.00"
    level_type: "level-2-only"
    interfaces:
      - name: "GigabitEthernet2"
        isis_area: "CORE"
        circuit_type: "level-2"
      - name: "Loopback0"
        isis_area: "CORE"
        passive: true
  
  # Area 2: CUSTOMER_PURPLE (connects to CE02 N9K via Gi4)
  customer:
    name: "CUSTOMER_PURPLE"
    net_address: "49.0002.0000.0000.0002.00"
    level_type: "level-1-only"
    interfaces:
      - name: "GigabitEthernet4"
        isis_area: "CUSTOMER_PURPLE"
        circuit_type: "level-1"
      - name: "Loopback0"
        isis_area: "CUSTOMER_PURPLE"
        passive: true

# Common ISIS settings
isis_common:
  metric_style: "wide"
  is_type: "mixed"  # PE running both L1 and L2
