[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
deprecation_warnings = False
gathering = smart

[ssh_connection]
ssh_args = -o HostKeyAlgorithms=ssh-rsa -o PubkeyAcceptedKeyTypes=ssh-rsa -o KexAlgorithms=diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 -o StrictHostKeyChecking=no
