---
# ============================================================================
# TASK 1: Configure n9k-ce01 for RED Clients L2 Switching - SOLUTION
# ============================================================================

- name: "TASK 1: Configure n9k-ce01 for RED Clients Reachability"
  hosts: "n9k-ce01"
  gather_facts: false
  connection: network_cli
  
  tasks:
    - name: "TASK 1A: Create VLAN 10 (RED) on n9k-ce01"
      cisco.nxos.nxos_vlans:
        state: merged
        config:
          - name: "{{ red_vlan.name }}"
            vlan_id: "{{ red_vlan.id }}"

    - name: "TASK 1B: Configure Eth1/3 (to client1) as L2 in VLAN 10"
      cisco.nxos.nxos_l2_interfaces:
        config:
          - name: "Ethernet1/3"
            access:
              vlan: "{{ red_vlan.id }}"
        state: merged

    - name: "TASK 1C: Configure Eth1/4 (to client2) as L2 in VLAN 10"
      cisco.nxos.nxos_l2_interfaces:
        config:
          - name: "Ethernet1/4"
            access:
              vlan: "{{ red_vlan.id }}"
        state: merged

    - name: "TASK 1D: Enable Eth1/3 and Eth1/4 (no shutdown)"
      cisco.nxos.nxos_interfaces:
        config:
          - name: "{{ item }}"
            enabled: true
        state: merged
      loop:
        - "Ethernet1/3"
        - "Ethernet1/4"
