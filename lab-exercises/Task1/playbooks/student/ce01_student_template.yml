---
# ============================================================================
# TASK 1: Configure n9k-ce01 for RED Clients L2 Switching - STUDENT TEMPLATE
# ============================================================================
#
# OBJECTIVE: Configure the ORANGE switch (n9k-ce01) to enable Layer 2
#            switching between RED clients (client1 and client2)
#
# EXPECTED OUTCOME:
# After this playbook runs, client1 (23.23.23.1) should be able to ping 
# client2 (23.23.23.2) because both are in the same VLAN
#
# HOW IT WORKS:
# 1. Create VLAN 10 for RED clients
# 2. Configure Eth1/3 and Eth1/4 as L2 access ports in VLAN 10
# 3. Switch learns MAC addresses and forwards frames within the VLAN
#
# ============================================================================

- name: "TASK 1: Configure n9k-ce01 for RED Clients Reachability"
  hosts: "n9k-ce01"                   # TODO: VERIFY: This target device name
  gather_facts: false                 # We don't need system facts for network config
  connection: network_cli             # Connect via CLI (SSH)
  
  # ───────────────────────────────────────────────────────────────────────────
  # TASK 1A: Create VLAN 10 for RED clients
  # ───────────────────────────────────────────────────────────────────────────
  
  tasks:
    - name: "TASK 1A: Create VLAN 10 (RED) on n9k-ce01"
      cisco.nxos.nxos_vlans:
        # TODO: What is the state? (hint: 'merged' means create/update)
        state: merged
        config:
          - name: "{{ red_vlan.name }}"           # e.g., RED_CLIENTS
            vlan_id: "{{ red_vlan.id }}"          # e.g., 10

    # ───────────────────────────────────────────────────────────────────────────
    # TASK 1B: Configure Ethernet1/3 as L2 access port in VLAN 10
    #          (This port connects to linux-client1)
    # ───────────────────────────────────────────────────────────────────────────
    
    - name: "TASK 1B: Configure Eth1/3 (to client1) as L2 in VLAN 10"
      cisco.nxos.nxos_l2_interfaces:
        config:
          - name: "Ethernet1/3"
            # TODO: What should the access vlan be?
            # This needs to match red_vlan.id
            access:
              vlan: "{{ red_vlan.id }}"
        state: merged                 # 'merged' means 'add to existing config'

    # ───────────────────────────────────────────────────────────────────────────
    # TASK 1C: Configure Ethernet1/4 as L2 access port in VLAN 10
    #          (This port connects to linux-client2)
    # ───────────────────────────────────────────────────────────────────────────
    
    - name: "TASK 1C: Configure Eth1/4 (to client2) as L2 in VLAN 10"
      cisco.nxos.nxos_l2_interfaces:
        config:
          - name: "Ethernet1/4"
            # TODO: What should the access vlan be?
            # This needs to match red_vlan.id
            access:
              vlan: "{{ red_vlan.id }}"
        state: merged

    # ───────────────────────────────────────────────────────────────────────────
    # TASK 1D: Enable the interfaces (no shutdown)
    # ───────────────────────────────────────────────────────────────────────────
    
    - name: "TASK 1D: Enable Eth1/3 and Eth1/4 (no shutdown)"
      cisco.nxos.nxos_interfaces:
        config:
          - name: "{{ item }}"
            enabled: true             # 'true' = no shutdown, 'false' = shutdown
        state: merged
      loop:
        - "Ethernet1/3"
        - "Ethernet1/4"
