# =============================================================================
# Service as Code Lab — Cisco Live 2026
# Containerlab Topology Definition
#
# Topology:  2x XRd P-routers  |  2x CSR1000v/C8000v PEs  |  2x N9Kv CEs  |  4x Linux clients
# Source:    LTRATO-1001 (verified deployed lab)
#
# To deploy:   sudo containerlab deploy -t topology/sac-lab.yml
# To destroy:  sudo containerlab destroy -t topology/sac-lab.yml
# =============================================================================

name: sac-lab

mgmt:
  network: sac-lab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  defaults:
    labels:
      lab: sac-lab
      project: cisco-live-2026

  kinds:
    cisco_xrd:
      image: ios-xr/xrd-control-plane:25.1.1

    # -----------------------------------------------------------------------
    # IOS-XE PE nodes — uncomment ONE of the following two blocks:
    #
    # Option A: CSR1000v (default)
    cisco_csr1000v:
      image: vrnetlab/cisco_csr1000v:17.03.06    # <-- replace with your image tag
    #
    # Option B: Catalyst 8000v — to use this instead, comment out Option A
    #           above and uncomment the two lines below, then change the PE
    #           node 'kind' fields from cisco_csr1000v to cisco_c8000v.
    # cisco_c8000v:
    #   image: vrnetlab/cisco_c8000v:17.12.01     # <-- replace with your image tag
    # -----------------------------------------------------------------------

    cisco_n9kv:
      image: vrnetlab/cisco_n9kv:10.4.3           # <-- replace with your image tag
      env:
        # Use n9kv-lite resource profile to keep the lab lightweight.
        # Bump these if you're using the full n9kv image (default: 10240 / 4).
        QEMU_MEMORY: "6144"
        QEMU_SMP: "2"

  nodes:
    # ===================== P-ROUTER CORE (IOS-XR / XRd) =====================
    xrd01:
      kind: cisco_xrd
      startup-config: ../configs/xrd01.cfg
      labels:
        role: p-router
        region: core

    xrd02:
      kind: cisco_xrd
      startup-config: ../configs/xrd02.cfg
      labels:
        role: p-router
        region: core

    # ===================== PE ROUTERS (IOS-XE / CSR1000v) ===================
    # To switch to Catalyst 8000v, change 'kind' to cisco_c8000v and
    # uncomment the cisco_c8000v kind block above.
    csr-pe01:
      kind: cisco_csr1000v
      startup-config: ../configs/csr-pe01.cfg
      labels:
        role: pe-router
        region: west

    csr-pe02:
      kind: cisco_csr1000v
      startup-config: ../configs/csr-pe02.cfg
      labels:
        role: pe-router
        region: east

    # ===================== CE / DC EDGE (NX-OS / N9Kv) ======================
    n9k-ce01:
      kind: cisco_n9kv
      startup-config: ../configs/n9k-ce01.cfg
      labels:
        role: ce-switch
        region: dc-west

    n9k-ce02:
      kind: cisco_n9kv
      startup-config: ../configs/n9k-ce02.cfg
      labels:
        role: ce-switch
        region: dc-east

    # ===================== LINUX TEST CLIENTS ==============================
    linux-client1:
      kind: linux
      image: alpine:latest
      labels:
        role: test-endpoint
      exec:
        # Assign an IP in the CUST_A VRF subnet reachable via n9k-ce01
        - ip addr add 192.168.100.10/24 dev eth1
        - ip route add 192.168.0.0/16 via 192.168.100.1

    linux-client2:
      kind: linux
      image: alpine:latest
      labels:
        role: test-endpoint
      exec:
        # Assign an IP in the CUST_A VRF subnet reachable via n9k-ce02
        - ip addr add 192.168.200.10/24 dev eth1
        - ip route add 192.168.0.0/16 via 192.168.200.1

    linux-client3:
      kind: linux
      image: alpine:latest
      labels:
        role: test-endpoint
      exec:
        # Assign an IP in the CUST_A VRF subnet reachable via n9k-ce01
        - ip addr add 192.168.100.20/24 dev eth1
        - ip route add 192.168.0.0/16 via 192.168.100.1

    linux-client4:
      kind: linux
      image: alpine:latest
      labels:
        role: test-endpoint
      exec:
        # Assign an IP in the CUST_A VRF subnet reachable via n9k-ce02
        - ip addr add 192.168.200.20/24 dev eth1
        - ip route add 192.168.0.0/16 via 192.168.200.1

  # ===========================================================================
  # LINKS
  #
  # Topology: LTRATO-1001 (verified deployed lab)
  # ===========================================================================
  links:
    # P-to-P core link
    - endpoints: [xrd01:Gi0-0-0-0, xrd02:Gi0-0-0-0]

    # xrd01 → csr-pe01
    - endpoints: [xrd01:Gi0-0-0-1, csr-pe01:eth1]

    # xrd02 → csr-pe02
    - endpoints: [xrd02:Gi0-0-0-1, csr-pe02:eth1]

    # inter-PE link
    - endpoints: [csr-pe01:eth2, csr-pe02:eth2]

    # PE → CE links
    - endpoints: [csr-pe01:eth3, n9k-ce01:eth1]
    - endpoints: [csr-pe02:eth3, n9k-ce02:eth1]

    # DC link between CEs
    - endpoints: [n9k-ce01:eth2, n9k-ce02:eth2]

    # CE → Linux client links
    - endpoints: [n9k-ce01:eth3, linux-client1:eth1]
    - endpoints: [n9k-ce02:eth3, linux-client2:eth1]
    - endpoints: [n9k-ce01:eth4, linux-client3:eth1]
    - endpoints: [n9k-ce02:eth4, linux-client4:eth1]
