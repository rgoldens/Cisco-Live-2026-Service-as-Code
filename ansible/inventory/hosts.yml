# =============================================================================
# Ansible Inventory — Service as Code Lab
#
# Containerlab management IPs are assigned from 172.20.20.0/24.
# After 'containerlab deploy', run 'containerlab inspect' to get actual IPs
# and update this inventory, or use the auto-generated ansible-inventory.yml
# that containerlab creates in the lab directory.
#
# To use the containerlab-generated inventory instead:
#   ansible-playbook -i clab-sac-lab/ansible-inventory.yml playbook.yml
# =============================================================================

all:
  vars:
    ansible_user: clab
    ansible_password: "clab@123"
    ansible_become: true
    ansible_become_method: enable

  children:
    # =========================================================================
    # IOS-XR P-Routers (XRd)
    # =========================================================================
    xrd:
      hosts:
        xrd01:
          ansible_host: 172.20.20.11     # update after deploy
        xrd02:
          ansible_host: 172.20.20.12     # update after deploy

    # =========================================================================
    # IOS-XE PE Routers (CSR1000v / C8000v)
    # =========================================================================
    csr:
      hosts:
        csr-pe01:
          ansible_host: 172.20.20.13     # update after deploy
        csr-pe02:
          ansible_host: 172.20.20.14     # update after deploy

    # =========================================================================
    # NX-OS CE/DC Switches (N9Kv)
    # =========================================================================
    n9kv:
      hosts:
        n9k-ce01:
          ansible_host: 172.20.20.15     # update after deploy
        n9k-ce02:
          ansible_host: 172.20.20.16     # update after deploy

    # =========================================================================
    # Linux Test Endpoints
    # =========================================================================
    linux:
      hosts:
        linux-client:
          ansible_host: 172.20.20.17     # update after deploy
          ansible_user: root
          ansible_password: ""
          ansible_connection: docker
          ansible_docker_extra_args: ""

    # =========================================================================
    # Convenience groups for service playbooks
    # =========================================================================
    pe_routers:
      children:
        csr:

    p_routers:
      children:
        xrd:

    ce_switches:
      children:
        n9kv:

    network:
      children:
        xrd:
        csr:
        n9kv:
