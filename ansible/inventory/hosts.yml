# =============================================================================
# Ansible Inventory — Service as Code Lab
#
# Containerlab management IPs are assigned from 172.20.20.0/24.
# After 'containerlab deploy', run 'containerlab inspect' to get actual IPs
# and update this inventory, or use the auto-generated ansible-inventory.yml
# that containerlab creates in the lab directory.
#
# To use the containerlab-generated inventory instead:
#   ansible-playbook -i clab-sac-lab/ansible-inventory.yml playbook.yml
# =============================================================================

all:
  vars:
    ansible_user: clab
    ansible_password: "clab@123"
    ansible_connection: network_cli
    ansible_network_os: ios
    ansible_become: true
    ansible_become_method: enable

  children:
    # =========================================================================
    # IOS-XR P-Routers (XRd) — LTRATO-1001
    # =========================================================================
    xrd:
      vars:
        ansible_network_os: iosxr
        ansible_user: clab
        ansible_password: "clab@123"
      hosts:
        xrd01:
          ansible_host: 172.20.20.10
        xrd02:
          ansible_host: 172.20.20.11

    # =========================================================================
    # IOS-XE PE Routers (CSR1000v) — LTRATO-1001
    # =========================================================================
    csr:
      vars:
        ansible_network_os: ios
        ansible_user: admin
        ansible_password: admin
      hosts:
        csr-pe01:
          ansible_host: 172.20.20.20
        csr-pe02:
          ansible_host: 172.20.20.21

    # =========================================================================
    # NX-OS CE/DC Switches (N9Kv) — LTRATO-1001
    # =========================================================================
    n9kv:
      vars:
        ansible_network_os: nxos
        ansible_user: admin
        ansible_password: admin
      hosts:
        n9k-ce01:
          ansible_host: 172.20.20.30
        n9k-ce02:
          ansible_host: 172.20.20.31

    # =========================================================================
    # Linux Test Endpoints — LTRATO-1001
    # =========================================================================
    linux:
      hosts:
        linux-client1:
          ansible_host: 172.20.20.40
          ansible_user: admin
          ansible_password: ""
        linux-client2:
          ansible_host: 172.20.20.41
          ansible_user: admin
          ansible_password: ""
        linux-client3:
          ansible_host: 172.20.20.42
          ansible_user: admin
          ansible_password: ""
        linux-client4:
          ansible_host: 172.20.20.43
          ansible_user: admin
          ansible_password: ""

    # =========================================================================
    # Convenience groups for service playbooks
    # =========================================================================
    pe_routers:
      children:
        csr:

    p_routers:
      children:
        xrd:

    ce_switches:
      children:
        n9kv:

    network:
      children:
        xrd:
        csr:
        n9kv:
