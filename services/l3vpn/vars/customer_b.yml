customer: CustomerB
vrf: CUST_B
rd: "65000:200"
rt_import: "65000:200"
rt_export: "65000:200"
description: "Customer B - SMB L3VPN"

pe_interfaces:
  - node: csr-pe01
    interface: GigabitEthernet2
    vrf_ip: 10.100.1.1/24
    description: "CUST_B CE-facing — toward n9k-ce01"
    ce_neighbor:
      ip: 10.100.1.2
      remote_as: 65100

  - node: csr-pe02
    interface: GigabitEthernet2
    vrf_ip: 10.100.2.1/24
    description: "CUST_B CE-facing — toward n9k-ce02"
    ce_neighbor:
      ip: 10.100.2.2
      remote_as: 65100

ce_interfaces:
  - node: n9k-ce01
    interface: Ethernet1/1
    ip: 10.100.1.2/24
    pe_gateway: 10.100.1.1

  - node: n9k-ce02
    interface: Ethernet1/1
    ip: 10.100.2.2/24
    pe_gateway: 10.100.2.1

expected_prefixes:
  - 10.100.1.0/24
  - 10.100.2.0/24
