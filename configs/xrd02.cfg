!! =============================================================================
!! XRd02 — P-Router / Route Reflector (Core East)
!! IOS-XR Startup Configuration
!! Service as Code Lab — Cisco Live 2026
!!
!! Containerlab wiring:
!!   Gi0/0/0/0 → xrd01 Gi0/0/0/0  (P-P backbone)
!!   Gi0/0/0/1 → csr-pe02 Gi2     (P-PE east link)
!!
!! NOTE: ISIS CORE and MPLS LDP on backbone (Gi0/0/0/0) are pre-configured.
!!       Task 3 will add: Gi0/0/0/1 to ISIS, MPLS LDP on PE links, BGP VPNv4.
!! =============================================================================

hostname xrd02

!! --- Users ---
username clab
 group root-lr
 group cisco-support
 secret 0 clab@123
!

!! --- Management ---
line default
 transport input ssh
!
ssh server v2
ssh server netconf vrf default
ssh server rate-limit 600
!
netconf-yang agent
 ssh
!
grpc
 port 57400
 no-tls
!

!! --- Loopback ---
interface Loopback0
 description P-Router xrd02 RID
 ipv4 address 192.168.0.2 255.255.255.255
!

!! --- Core backbone link: xrd02 ↔ xrd01 ---
interface GigabitEthernet0/0/0/0
 description TO_xrd01_Gi0-0-0-0
 ipv4 address 10.0.0.2 255.255.255.252
 no shutdown
!

!! --- PE link: xrd02 ↔ csr-pe02 ---
interface GigabitEthernet0/0/0/1
 description TO_csr-pe02_Gi2
 ipv4 address 10.1.0.9 255.255.255.252
 no shutdown
!

!! --- IS-IS CORE (backbone IGP — pre-configured infrastructure) ---
router isis CORE
 is-type level-2-only
 net 49.0001.1921.6800.0002.00
 address-family ipv4 unicast
  metric-style wide
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
  !
 !
 interface GigabitEthernet0/0/0/0
  circuit-type level-2-only
  point-to-point
  address-family ipv4 unicast
  !
 !
!

end
