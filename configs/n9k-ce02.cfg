!! =============================================================================
!! N9K-CE02 — CE / DC Switch (East)
!! NX-OS Startup Configuration
!! Service as Code Lab — Cisco Live 2026
!! =============================================================================

hostname n9k-ce02

!! --- Features ---
feature ssh
feature scp-server
feature netconf
feature nxapi
feature grpc
feature bgp
feature ospf
feature interface-vlan
feature vn-segment-vlan-based
feature nv overlay
feature lacp

!! --- Users ---
username admin password 0 admin role network-admin
username clab password 0 clab@123 role network-admin

!! --- NXAPI ---
nxapi http port 80
nxapi https port 443

!! --- Loopback ---
interface loopback0
  description CE02 RID
  ip address 10.0.0.22/32

!! --- NVE loopback (VXLAN VTEP source) ---
interface loopback1
  description VTEP Source
  ip address 10.0.0.32/32

!! --- Eth1/1: CE ↔ PE uplink (toward csr-pe02) ---
interface Ethernet1/1
  description TO_csr-pe02_Gi2
  no switchport
  ip address 10.0.3.6/30
  no shutdown

!! --- Eth1/2: DC inter-switch link (toward n9k-ce01, VXLAN underlay) ---
interface Ethernet1/2
  description TO_n9k-ce01_Eth1/2
  no switchport
  ip address 10.0.4.2/30
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

!! --- VLAN for CUST_A ---
vlan 100
  name CUST_A
  vn-segment 10100

!! --- SVI for CUST_A ---
interface Vlan100
  description CUST_A Gateway
  no shutdown
  ip address 192.168.100.2/24

!! --- OSPF underlay for VXLAN ---
router ospf UNDERLAY
  router-id 10.0.0.22

interface loopback0
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback1
  ip router ospf UNDERLAY area 0.0.0.0

!! --- NVE interface (VXLAN) ---
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  member vni 10100
    ingress-replication protocol bgp

!! --- BGP for EVPN ---
router bgp 65100
  router-id 10.0.0.22
  log-neighbor-changes
  address-family l2vpn evpn
  !
  !! eBGP to PE
  neighbor 10.0.3.5
    remote-as 65000
    description csr-pe02
    address-family ipv4 unicast
  !
  !! iBGP EVPN peering to n9k-ce01
  neighbor 10.0.0.21
    remote-as 65100
    description n9k-ce01
    update-source loopback0
    address-family l2vpn evpn
      send-community
      send-community extended

!! --- EVPN ---
evpn
  vni 10100 l2
    rd auto
    route-target import auto
    route-target export auto
