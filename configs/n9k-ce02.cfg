!! =============================================================================
!! N9K-CE02 — CE / DC Switch (East)
!! NX-OS Startup Configuration
!! Service as Code Lab — Cisco Live 2026
!!
!! Containerlab wiring:
!!   eth1 → Ethernet1/1 → csr-pe02 Gi4  (PE uplink)
!!   eth2 → Ethernet1/2 → n9k-ce01 Eth1/2  (DC inter-switch, unused)
!!   eth3 → Ethernet1/3 → linux-client3
!!   eth4 → Ethernet1/4 → linux-client4
!!
!! NOTE: VLANs are deployed by Task 1. ISIS is deployed by Task 2.
!! =============================================================================

hostname n9k-ce02

!! --- Features ---
feature ssh
feature scp-server
feature interface-vlan
feature lacp

!! --- Users ---
username admin password 0 admin role network-admin
username clab password 0 clab@123 role network-admin

!! --- Loopback ---
interface loopback0
  description CE02 Router-ID
  ip address 10.0.0.22/32

!! --- Eth1/1: CE ↔ PE uplink (toward csr-pe02 Gi4) ---
interface Ethernet1/1
  description TO_csr-pe02_Gi4
  no switchport
  ip address 10.2.0.6/30
  no shutdown

!! --- Eth1/3: Downlink to linux-client3 ---
interface Ethernet1/3
  description TO_linux-client3
  no shutdown

!! --- Eth1/4: Downlink to linux-client4 ---
interface Ethernet1/4
  description TO_linux-client4
  no shutdown

