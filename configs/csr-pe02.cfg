!! =============================================================================
!! CSR-PE02 — PE Router (East)
!! IOS-XE Startup Configuration
!! Service as Code Lab — Cisco Live 2026
!!
!! Containerlab wiring:
!!   eth1 → GigabitEthernet2 → xrd02 Gi0/0/0/1  (backbone uplink)
!!   eth2 → GigabitEthernet3 → csr-pe01 Gi3      (inter-PE, unused)
!!   eth3 → GigabitEthernet4 → n9k-ce02 Eth1/1   (CE-facing downlink)
!!
!! NOTE: ISIS, MPLS, BGP, and VRF are NOT pre-configured.
!!       They will be deployed by Task 2 (ISIS) and Task 3 (MPLS/BGP/VRF).
!! =============================================================================

hostname csr-pe02

!! --- AAA & Users ---
aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 secret 0 admin
username clab privilege 15 secret 0 clab@123
!

!! --- Services ---
ip ssh version 2
ip scp server enable
!

!! --- Loopback ---
interface Loopback0
 description PE02 Router-ID
 ip address 192.168.10.12 255.255.255.255
!

!! --- Gi2: Backbone uplink (toward xrd02 Gi0/0/0/1) ---
interface GigabitEthernet2
 description TO_xrd02_Gi0-0-0-1
 ip address 10.1.0.10 255.255.255.252
 no shutdown
!

!! --- Gi3: Inter-PE link (toward csr-pe01 Gi3) — unused by tasks ---
interface GigabitEthernet3
 description TO_csr-pe01_Gi3_UNUSED
 no ip address
 no shutdown
!

!! --- Gi4: CE-facing downlink (toward n9k-ce02 Eth1/1) ---
interface GigabitEthernet4
 description TO_n9k-ce02_Eth1-1
 ip address 10.2.0.5 255.255.255.252
 no shutdown
!

end
