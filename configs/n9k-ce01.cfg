!! =============================================================================
!! N9K-CE01 — CE / DC Switch (West)
!! NX-OS Startup Configuration
!! Service as Code Lab — Cisco Live 2026
!!
!! Containerlab wiring:
!!   eth1 → Ethernet1/1 → csr-pe01 Gi4  (PE uplink)
!!   eth2 → Ethernet1/2 → n9k-ce02 Eth1/2  (DC inter-switch, unused)
!!   eth3 → Ethernet1/3 → linux-client1
!!   eth4 → Ethernet1/4 → linux-client2
!!
!! NOTE: VLANs are deployed by Task 1. ISIS is deployed by Task 2.
!! =============================================================================

hostname n9k-ce01

!! --- Features ---
feature ssh
feature scp-server
feature interface-vlan
feature lacp

!! --- Users ---
username admin password 0 admin role network-admin
username clab password 0 clab@123 role network-admin

!! --- Loopback ---
interface loopback0
  description CE01 Router-ID
  ip address 10.0.0.21/32

!! --- Eth1/1: CE ↔ PE uplink (toward csr-pe01 Gi4) ---
interface Ethernet1/1
  description TO_csr-pe01_Gi4
  no switchport
  ip address 10.2.0.2/30
  no shutdown

!! --- Eth1/3: Downlink to linux-client1 ---
interface Ethernet1/3
  description TO_linux-client1
  no shutdown

!! --- Eth1/4: Downlink to linux-client2 ---
interface Ethernet1/4
  description TO_linux-client2
  no shutdown

